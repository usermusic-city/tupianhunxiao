<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好图当赏 - 无损混淆工具</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f7f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        h2 { color: #2E7D32; margin-top: 0; }
        canvas { max-width: 100%; border: 1px solid #ccc; margin: 15px 0; background: #eee; display: block; margin-left: auto; margin-right: auto; }
        .btn-select { background: #607D8B; padding: 15px; border-radius: 8px; color: white; border: none; width: 100%; cursor: pointer; font-weight: bold; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        button:active { opacity: 0.8; }
        .btn-enc { background: #4CAF50; }
        .btn-dec { background: #2196F3; }
        .btn-save { background: #FF9800; grid-column: span 2; }
        #status { margin-top: 15px; font-size: 14px; color: #555; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>好图当赏</h2>
    <button class="btn-select" onclick="document.getElementById('fileInput').click()">点击此处选择 PNG 图片</button>
    <input type="file" id="fileInput" accept="image/png">
    
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="btn-enc" onclick="run(true)">加密混淆</button>
        <button class="btn-dec" onclick="run(false)">解密还原</button>
        <button class="btn-save" onclick="savePng()">保存为 PNG (无损)</button>
    </div>
    <div id="status">请选择一张 PNG 图片</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let curveX, curveY, currentIndex;

    // 文件选择处理
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                document.getElementById('status').innerText = `已加载: ${img.width}x${img.height}`;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // 核心算法 (强制 32 位整数运算以对齐 Java)
    function run(isEncrypt) {
        if (!canvas.width) { alert("请先上传图片"); return; }
        const w = canvas.width | 0, h = canvas.height | 0;
        const total = (w * h) | 0;
        document.getElementById('status').innerText = "处理中...";

        setTimeout(() => {
            const imgData = ctx.getImageData(0, 0, w, h);
            const pixels = new Uint32Array(imgData.data.buffer);
            const res = new Uint32Array(total);

            curveX = new Int32Array(total);
            curveY = new Int32Array(total);
            currentIndex = 0;
            
            // 路径生成
            if (w >= h) generate2d(0, 0, w, 0, 0, h);
            else generate2d(0, 0, 0, h, w, 0);

            const offset = Math.round((Math.sqrt(5) - 1) / 2 * total) | 0;
            
            for (let i = 0; i < total; i++) {
                const targetIdx = (i + offset) % total;
                const idx1 = (curveY[i] * w + curveX[i]) | 0;
                const idx2 = (curveY[targetIdx] * w + curveX[targetIdx]) | 0;

                if (isEncrypt) res[idx2] = pixels[idx1];
                else res[idx1] = pixels[idx2];
            }

            pixels.set(res);
            ctx.putImageData(imgData, 0, 0);
            document.getElementById('status').innerText = "处理完成！";
        }, 50);
    }

    // 强制整数运算版本的 Gilbert 曲线生成
    function generate2d(x, y, ax, ay, bx, by) {
        x = x | 0; y = y | 0; ax = ax | 0; ay = ay | 0; bx = bx | 0; by = by | 0;
        let w = Math.abs(ax + ay) | 0;
        let h = Math.abs(bx + by) | 0;
        let dax = Math.sign(ax) | 0; let day = Math.sign(ay) | 0;
        let dbx = Math.sign(bx) | 0; let dby = Math.sign(by) | 0;

        if (h === 1) { for (let i = 0; i < w; i++) { curveX[currentIndex] = x; curveY[currentIndex] = y; currentIndex = (currentIndex + 1) | 0; x = (x + dax) | 0; y = (y + day) | 0; } return; }
        if (w === 1) { for (let i = 0; i < h; i++) { curveX[currentIndex] = x; curveY[currentIndex] = y; currentIndex = (currentIndex + 1) | 0; x = (x + dbx) | 0; y = (y + dby) | 0; } return; }

        let ax2 = (ax / 2) | 0; let ay2 = (ay / 2) | 0;
        let bx2 = (bx / 2) | 0; let by2 = (by / 2) | 0;

        if ((2 * w) > (3 * h)) {
            if (((Math.abs(ax2 + ay2) % 2) !== 0) && (w > 2)) { ax2 = (ax2 + dax) | 0; ay2 = (ay2 + day) | 0; }
            generate2d(x, y, ax2, ay2, bx, by);
            generate2d((x + ax2) | 0, (y + ay2) | 0, (ax - ax2) | 0, (ay - ay2) | 0, bx, by);
        } else {
            if (((Math.abs(bx2 + by2) % 2) !== 0) && (h > 2)) { bx2 = (bx2 + dbx) | 0; by2 = (by2 + dby) | 0; }
            generate2d(x, y, bx2, by2, ax2, ay2);
            generate2d((x + bx2) | 0, (y + by2) | 0, ax, ay, (bx - bx2) | 0, (by - by2) | 0);
            generate2d((x + (ax - dax) + (bx2 - dbx)) | 0, (y + (ay - day) + (by2 - dby)) | 0, (-bx2) | 0, (-by2) | 0, (-(ax - ax2)) | 0, (-(ay - ay2)) | 0);
        }
    }

    function savePng() {
        if (!canvas.width) return;
        const link = document.createElement('a');
        link.download = 'obfuscated_' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
